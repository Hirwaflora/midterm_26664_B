<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - E-Procurement</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="header">
        <div class="logo">E-Procurement Admin</div>
        <div class="nav-links">
            <span class="user-badge">Admin</span>
            <button id="logoutBtn" class="btn-outline">Logout</button>
        </div>
    </div>

    <div class="container main-content hidden-overflow">
        <div class="dashboard-panel glass-panel">
            <div class="flex-between">
                <h1 class="page-title">Registered Suppliers</h1>
                <div class="stats-badge"><span id="totalSuppliers">0</span> Total</div>
            </div>

            <div class="table-responsive mt-4">
                <table id="suppliersTable" class="styled-table">
                    <thead>
                        <tr>
                            <th>TIN / Reg No</th>
                            <th>Supplier Name</th>
                            <th>Country</th>
                            <th>Business Type</th>
                            <th>Email</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="supplierTableBody">
                        <!-- Filled by JS -->
                    </tbody>
                </table>
                <div id="noDataMessage" class="text-center mt-4 hidden">
                    <p>No suppliers have registered yet.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for Supplier Details -->
    <div id="supplierModal" class="modal hidden">
        <div class="modal-content glass-panel">
            <span class="close-modal">&times;</span>
            <h2 id="modalSupplierName">Supplier Details</h2>
            <div id="modalContent" class="modal-grid"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Check if admin is logged in
        if (sessionStorage.getItem('adminLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
</body>

</html>
