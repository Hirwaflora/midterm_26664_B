<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier Registration - E-Procurement</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="header">
        <div class="logo">E-Procurement</div>
        <div class="nav-links">
            <a href="login.html" class="btn-outline">Admin Login</a>
        </div>
    </div>

    <div class="container main-content hidden-overflow">
        <div class="registration-form glass-panel">
            <h1 class="page-title">Supplier Registration</h1>
            <p class="page-subtitle">Join our e-procurement network to participate in tenders and bidding.</p>

            <form id="supplierForm">
                <!-- Section 1: General Info -->
                <div class="form-section">
                    <h2>1. Supplier General Information</h2>
                    <div class="form-grid">
                        <div class="input-group">
                            <label>Supplier Name *</label>
                            <input type="text" id="supplierName" required>
                        </div>
                        <div class="input-group">
                            <label>TIN/Business Reg. No *</label>
                            <input type="text" id="tinNo" required>
                        </div>
                        <div class="input-group">
                            <label>Business Certificate *</label>
                            <input type="file" id="bizCert" required>
                        </div>
                        <div class="input-group">
                            <label>Password *</label>
                            <input type="password" id="password" required>
                        </div>
                        <div class="input-group">
                            <label>RSSB No *</label>
                            <input type="text" id="rssbNo" required>
                        </div>
                        <div class="input-group">
                            <label>Head Office Country *</label>
                            <select id="country" required>
                                <option value="">Select Country</option>
                                <option value="Rwanda">Rwanda</option>
                                <option value="Kenya">Kenya</option>
                                <option value="Uganda">Uganda</option>
                                <option value="Tanzania">Tanzania</option>
                                <option value="Burundi">Burundi</option>
                                <option value="South Africa">South Africa</option>
                                <option value="United States">United States</option>
                                <option value="United Kingdom">United Kingdom</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Registration Date *</label>
                            <input type="date" id="regDate" required>
                        </div>
                        <div class="input-group">
                            <label>Business Type *</label>
                            <select id="bizType" required>
                                <option value="">Select Type</option>
                                <option value="IT Services">IT Services</option>
                                <option value="Construction">Construction</option>
                                <option value="Consulting">Consulting</option>
                                <option value="Manufacturing">Manufacturing</option>
                                <option value="Supply Chain">Supply Chain</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Capital (Currency) *</label>
                            <div class="currency-input">
                                <select id="currency" required>
                                    <option value="RWF">RWF</option>
                                    <option value="USD">USD</option>
                                    <option value="EUR">EUR</option>
                                </select>
                                <input type="number" id="capital" required>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>Number of Employees *</label>
                            <input type="number" id="employees" required>
                        </div>
                        <div class="input-group">
                            <label>P.O.BOX</label>
                            <input type="text" id="poBox">
                        </div>
                        <div class="input-group">
                            <label>Address *</label>
                            <input type="text" id="address" required>
                        </div>
                        <div class="input-group">
                            <label>Telephone 1 *</label>
                            <input type="tel" id="tel1" required>
                        </div>
                        <div class="input-group">
                            <label>Telephone 2</label>
                            <input type="tel" id="tel2">
                        </div>
                        <div class="input-group">
                            <label>Fax</label>
                            <input type="text" id="fax">
                        </div>
                        <div class="input-group">
                            <label>Email *</label>
                            <input type="email" id="email" required>
                        </div>
                        <div class="input-group">
                            <label>Website</label>
                            <input type="url" id="website">
                        </div>
                    </div>
                </div>

                <!-- Section 2: Bank Details -->
                <div class="form-section">
                    <h2>2. Bank Details</h2>
                    <div class="form-grid">
                        <div class="input-group">
                            <label>Bank Name *</label>
                            <input type="text" id="bankName" required>
                        </div>
                        <div class="input-group">
                            <label>Account No *</label>
                            <input type="text" id="accountNo" required>
                        </div>
                        <div class="input-group">
                            <label>Account Holder *</label>
                            <input type="text" id="accountHolder" required>
                        </div>
                    </div>
                </div>

                <!-- Section 3: Representative -->
                <div class="form-section">
                    <h2>3. Representative Information</h2>
                    <div class="form-grid">
                        <div class="input-group">
                            <label>Name *</label>
                            <input type="text" id="repName" required>
                        </div>
                        <div class="input-group">
                            <label>National ID/Passport *</label>
                            <input type="text" id="repId" required>
                        </div>
                        <div class="input-group">
                            <label>Mobile Phone *</label>
                            <input type="tel" id="repPhone" required>
                        </div>
                        <div class="input-group">
                            <label>Email *</label>
                            <input type="email" id="repEmail" required>
                        </div>
                        <div class="input-group">
                            <label>P.O.BOX</label>
                            <input type="text" id="repPoBox">
                        </div>
                    </div>
                </div>

                <div class="form-section terms-section">
                    <label class="checkbox-container">
                        <input type="checkbox" id="terms" required>
                        <span class="checkmark"></span>
                        I agree to the <a href="#">Terms and Conditions</a> of the E-Procurement system.
                    </label>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Register as Supplier</button>
                    <div id="formMessage" class="message hidden"></div>
                </div>
            </form>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
