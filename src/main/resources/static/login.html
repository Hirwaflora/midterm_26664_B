<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - E-Procurement</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body class="center-content">
    <div class="login-container glass-panel">
        <div class="text-center">
            <h1 class="page-title">Admin Login</h1>
            <p class="page-subtitle">Login to view registered suppliers</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label>Admin Password</label>
                <input type="password" id="adminPassword" placeholder="Enter password" required>
            </div>

            <div class="form-actions mt-4">
                <button type="submit" class="btn-primary w-100">Login</button>
            </div>
            <div id="loginError" class="error-text hidden mt-2 text-center">Invalid password. Hint: try 'admin123'</div>

            <div class="text-center mt-4">
                <a href="index.html" class="link-text">Return to Registration</a>
            </div>
        </form>
    </div>
    <script src="js/app.js"></script>
</body>

</html>
